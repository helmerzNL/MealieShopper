services:
  mealieshopper:
    image: ghcr.io/helmerznl/mealieshopper:latest
    container_name: mealieshopper
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.unraid
    ports:
      - "${MEALIESHOPPER_PORT:-8000}:8000"
    volumes:
      - "${MEALIESHOPPER_APPDATA:-/mnt/user/appdata/mealieshopper}:/data"
